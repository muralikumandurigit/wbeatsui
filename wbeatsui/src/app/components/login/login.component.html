<div class="form-container">
 <mat-grid-list cols="1" rowHeight="100px">
   <form #myform="ngForm" (ngSubmit)="login(myform)" class="form form-register">
      <mat-grid-tile>
         <mat-form-field appearance="fill">
            <mat-label>Username</mat-label>
            <input matInput name="username" ngModel required>
         </mat-form-field>
      </mat-grid-tile>
      <mat-grid-tile>
         <mat-form-field appearance="fill">
            <mat-label>Password</mat-label>
            <input matInput type="password" name="password" ngModel required>
         </mat-form-field>
      </mat-grid-tile>
      <mat-grid-tile>
         <button mat-raised-button type="submit">Login</button>
      </mat-grid-tile>
      <mat-grid-tile>
      <div *ngIf="isLoginFailed">
         <mat-label>Login Failed!!!</mat-label>
      </div>
     </mat-grid-tile>
   </form>
 </mat-grid-list>
</div>
